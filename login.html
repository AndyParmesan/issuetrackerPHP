<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IssueTracker — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: #cc0000;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .topbar img {
      height: 40px;
      object-fit: contain;
    }

    .topbar-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.02em;
    }

    .topbar-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      font-family: 'Roboto Mono', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .topbar-time {
      margin-left: auto;
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      font-family: 'Roboto Mono', monospace;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 40px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .card-logo img {
      max-width: 180px;
      object-fit: contain;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
      text-align: center;
    }

    .card-sub {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-bottom: 28px;
      font-family: 'Roboto Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: 'Roboto', sans-serif;
      color: #222;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #cc0000;
      box-shadow: 0 0 0 3px rgba(204,0,0,0.08);
      background: #fff;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Roboto', sans-serif;
      letter-spacing: 0.04em;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover  { background: #aa0000; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      display: none;
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #cc0000;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 16px;
      text-align: center;
    }

    .error-msg.show { display: block; }

    .footer-note {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      margin-top: 24px;
      font-family: 'Roboto Mono', monospace;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <img src="Castles_Technology_logo.png" alt="Castles Technology" onerror="this.style.display='none'" />
    <div class="topbar-text">
      <span class="topbar-title">IssueTracker</span>
      <span class="topbar-sub">Castles Technology</span>
    </div>
    <div class="topbar-time" id="datetime"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="card">

      <div class="card-logo">
        <img src="Castles_Technology_logo.png" alt="Castles Technology" onerror="this.style.display='none'" />
      </div>

      <div class="card-title">Welcome Back</div>
      <div class="card-sub">Sign in to your account</div>

      <div class="error-msg" id="error-msg">Invalid username or password.</div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
      </div>

      <button class="btn-login" id="login-btn" onclick="handleLogin()">Login</button>

      <div class="footer-note">IssueTracker &copy; Castles Technology 2026</div>
    </div>
  </div>

  <script>
    // Already logged in? skip to app
    if (localStorage.getItem('loggedIn')) {
      window.location.href = 'index.html';
    }

    // Live datetime
    function updateTime() {
      const now = new Date();
      const el = document.getElementById('datetime');
      if (el) el.textContent = now.toLocaleString('en-PH', {
        weekday: 'short', year: 'numeric', month: 'short',
        day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }
    updateTime();
    setInterval(updateTime, 1000);

    // MD5 implementation
    function md5(string) {
      function safeAdd(x, y) { var lsw=(x&0xffff)+(y&0xffff); var msw=(x>>16)+(y>>16)+(lsw>>16); return (msw<<16)|(lsw&0xffff); }
      function bitRotateLeft(num, cnt) { return (num<<cnt)|(num>>>(32-cnt)); }
      function md5cmn(q,a,b,x,s,t) { return safeAdd(bitRotateLeft(safeAdd(safeAdd(a,q),safeAdd(x,t)),s),b); }
      function md5ff(a,b,c,d,x,s,t) { return md5cmn((b&c)|(~b&d),a,b,x,s,t); }
      function md5gg(a,b,c,d,x,s,t) { return md5cmn((b&d)|(c&~d),a,b,x,s,t); }
      function md5hh(a,b,c,d,x,s,t) { return md5cmn(b^c^d,a,b,x,s,t); }
      function md5ii(a,b,c,d,x,s,t) { return md5cmn(c^(b|~d),a,b,x,s,t); }
      function md5blk(s) { var md5blks=[],i; for(i=0;i<64;i+=4){md5blks[i>>2]=s.charCodeAt(i)+(s.charCodeAt(i+1)<<8)+(s.charCodeAt(i+2)<<16)+(s.charCodeAt(i+3)<<24);} return md5blks; }
      var hexChars='0123456789abcdef';
      function rhex(n){var s='',j=0;for(;j<4;j++)s+=hexChars[(n>>(j*8+4))&0x0f]+hexChars[(n>>(j*8))&0x0f];return s;}
      function hex(x){for(var i=0;i<x.length;i++)x[i]=rhex(x[i]);return x.join('');}
      function str2binl(str){var bin=[],mask=(1<<8)-1;for(var i=0;i<str.length*8;i+=8)bin[i>>5]|=(str.charCodeAt(i/8)&mask)<<(i%32);return bin;}
      function binl2str(bin){var str='',mask=(1<<8)-1;for(var i=0;i<bin.length*32;i+=8)str+=String.fromCharCode((bin[i>>5]>>>(i%32))&mask);return str;}
      function binl_md5(x,len){
        x[len>>5]|=0x80<<(len%32);x[(((len+64)>>>9)<<4)+14]=len;
        var i,olda,oldb,oldc,oldd,a=1732584193,b=-271733879,c=-1732584194,d=271733878;
        for(i=0;i<x.length;i+=16){
          olda=a;oldb=b;oldc=c;oldd=d;
          a=md5ff(a,b,c,d,x[i],7,-680876936);d=md5ff(d,a,b,c,x[i+1],12,-389564586);
          c=md5ff(c,d,a,b,x[i+2],17,606105819);b=md5ff(b,c,d,a,x[i+3],22,-1044525330);
          a=md5ff(a,b,c,d,x[i+4],7,-176418897);d=md5ff(d,a,b,c,x[i+5],12,1200080426);
          c=md5ff(c,d,a,b,x[i+6],17,-1473231341);b=md5ff(b,c,d,a,x[i+7],22,-45705983);
          a=md5ff(a,b,c,d,x[i+8],7,1770035416);d=md5ff(d,a,b,c,x[i+9],12,-1958414417);
          c=md5ff(c,d,a,b,x[i+10],17,-42063);b=md5ff(b,c,d,a,x[i+11],22,-1990404162);
          a=md5ff(a,b,c,d,x[i+12],7,1804603682);d=md5ff(d,a,b,c,x[i+13],12,-40341101);
          c=md5ff(c,d,a,b,x[i+14],17,-1502002290);b=md5ff(b,c,d,a,x[i+15],22,1236535329);
          a=md5gg(a,b,c,d,x[i+1],5,-165796510);d=md5gg(d,a,b,c,x[i+6],9,-1069501632);
          c=md5gg(c,d,a,b,x[i+11],14,643717713);b=md5gg(b,c,d,a,x[i],20,-373897302);
          a=md5gg(a,b,c,d,x[i+5],5,-701558691);d=md5gg(d,a,b,c,x[i+10],9,38016083);
          c=md5gg(c,d,a,b,x[i+15],14,-660478335);b=md5gg(b,c,d,a,x[i+4],20,-405537848);
          a=md5gg(a,b,c,d,x[i+9],5,568446438);d=md5gg(d,a,b,c,x[i+14],9,-1019803690);
          c=md5gg(c,d,a,b,x[i+3],14,-187363961);b=md5gg(b,c,d,a,x[i+8],20,1163531501);
          a=md5gg(a,b,c,d,x[i+13],5,-1444681467);d=md5gg(d,a,b,c,x[i+2],9,-51403784);
          c=md5gg(c,d,a,b,x[i+7],14,1735328473);b=md5gg(b,c,d,a,x[i+12],20,-1926607734);
          a=md5hh(a,b,c,d,x[i+5],4,-378558);d=md5hh(d,a,b,c,x[i+8],11,-2022574463);
          c=md5hh(c,d,a,b,x[i+11],16,1839030562);b=md5hh(b,c,d,a,x[i+14],23,-35309556);
          a=md5hh(a,b,c,d,x[i+1],4,-1530992060);d=md5hh(d,a,b,c,x[i+4],11,1272893353);
          c=md5hh(c,d,a,b,x[i+7],16,-155497632);b=md5hh(b,c,d,a,x[i+10],23,-1094730640);
          a=md5hh(a,b,c,d,x[i+13],4,681279174);d=md5hh(d,a,b,c,x[i],11,-358537222);
          c=md5hh(c,d,a,b,x[i+3],16,-722521979);b=md5hh(b,c,d,a,x[i+6],23,76029189);
          a=md5hh(a,b,c,d,x[i+9],4,-640364487);d=md5hh(d,a,b,c,x[i+12],11,-421815835);
          c=md5hh(c,d,a,b,x[i+15],16,530742520);b=md5hh(b,c,d,a,x[i+2],23,-995338651);
          a=md5ii(a,b,c,d,x[i],6,-198630844);d=md5ii(d,a,b,c,x[i+7],10,1126891415);
          c=md5ii(c,d,a,b,x[i+14],15,-1416354905);b=md5ii(b,c,d,a,x[i+5],21,-57434055);
          a=md5ii(a,b,c,d,x[i+12],6,1700485571);d=md5ii(d,a,b,c,x[i+3],10,-1894986606);
          c=md5ii(c,d,a,b,x[i+10],15,-1051523);b=md5ii(b,c,d,a,x[i+1],21,-2054922799);
          a=md5ii(a,b,c,d,x[i+8],6,1873313359);d=md5ii(d,a,b,c,x[i+15],10,-30611744);
          c=md5ii(c,d,a,b,x[i+6],15,-1560198380);b=md5ii(b,c,d,a,x[i+13],21,1309151649);
          a=md5ii(a,b,c,d,x[i+4],6,-145523070);d=md5ii(d,a,b,c,x[i+11],10,-1120210379);
          c=md5ii(c,d,a,b,x[i+2],15,718787259);b=md5ii(b,c,d,a,x[i+9],21,-343485551);
          a=safeAdd(a,olda);b=safeAdd(b,oldb);c=safeAdd(c,oldc);d=safeAdd(d,oldd);
        }
        return [a,b,c,d];
      }
      return hex(binl_md5(str2binl(string),string.length*8));
    }

    // Login handler
    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      const btn      = document.getElementById('login-btn');

      errorMsg.classList.remove('show');

      if (!username || !password) {
        errorMsg.textContent = 'Please enter username and password.';
        errorMsg.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const hashedPassword = md5(password);

      try {
        const res = await fetch(window.location.protocol + '//' + window.location.hostname + '/issuetracker/api/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password: hashedPassword })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('loggedIn', 'true');
          localStorage.setItem('username', data.data.username);
          localStorage.setItem('role', data.data.role);
          localStorage.setItem('userName', data.data.name);
          localStorage.setItem('userId', data.data.id);
          window.location.href = 'index.html';
        } else {
          errorMsg.textContent = data.message || 'Invalid username or password.';
          errorMsg.classList.add('show');
        }
      } catch (err) {
        errorMsg.textContent = 'Cannot connect to server. Check if XAMPP is running.';
        errorMsg.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }

    // Enter key submits
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>

</body>
</html>
